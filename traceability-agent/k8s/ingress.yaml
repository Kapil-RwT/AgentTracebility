apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traceability-agent-ingress
  namespace: ml-services
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /traceability-agent(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: traceability-agent-service
            port:
              number: 8080
